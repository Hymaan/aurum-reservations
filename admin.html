<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96E;
    --gold-dim: #8a6d2f;
    --cream: #F5EFE0;
    --charcoal: #1A1714;
    --dark: #0E0C0A;
    --mid: #2C2820;
    --text-muted: #7A6E5F;
    --divider: rgba(201,168,76,0.2);
    --red: #e06060;
    --green: #6abf7a;
  }

  html, body { height: 100%; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
  }

  /* ─── LOGIN SCREEN ─── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #loginScreen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
      linear-gradient(180deg, var(--dark) 0%, var(--charcoal) 100%);
  }

  .login-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 2rem;
  }

  .login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 0.3rem;
  }

  .login-sub {
    text-align: center;
    font-size: 0.6rem;
    font-weight: 200;
    letter-spacing: 0.5em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .login-card {
    background: var(--charcoal);
    border: 1px solid var(--divider);
    padding: 2.5rem;
  }

  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 0.4rem;
  }

  .login-title em { font-style: italic; color: var(--gold); }

  .login-desc {
    font-size: 0.72rem;
    font-weight: 200;
    color: var(--text-muted);
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }

  .form-label {
    font-size: 0.58rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }

  .form-input {
    background: var(--mid);
    border: 1px solid rgba(201,168,76,0.15);
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    padding: 0.85rem 1rem;
    outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }

  .form-input:focus { border-color: var(--gold-dim); }
  .form-input::placeholder { color: var(--text-muted); font-size: 0.8rem; }

  .login-btn {
    width: 100%;
    background: var(--gold);
    border: none;
    color: var(--dark);
    font-family: 'Raleway', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 0.5rem;
  }

  .login-btn:hover { background: var(--gold-light); }
  .login-btn:disabled { opacity: 0.6; cursor: default; }

  .login-error {
    font-size: 0.72rem;
    color: var(--red);
    margin-top: 1rem;
    text-align: center;
    display: none;
  }

  /* ─── DASHBOARD ─── */
  #dashboard { display: none; height: 100vh; flex-direction: column; }
  #dashboard.visible { display: flex; }

  /* Top Bar */
  .topbar {
    background: var(--charcoal);
    border-bottom: 1px solid var(--divider);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.12em;
  }

  .topbar-badge {
    font-size: 0.55rem;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    border: 1px solid var(--divider);
    padding: 0.25rem 0.75rem;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .admin-name {
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--text-muted);
  }

  .admin-name span { color: var(--gold); }

  .logout-btn {
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 0.58rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* Stats Bar */
  .stats-bar {
    background: var(--dark);
    border-bottom: 1px solid var(--divider);
    padding: 0 2rem;
    display: flex;
    gap: 0;
    flex-shrink: 0;
    overflow-x: auto;
  }

  .stat-card {
    padding: 1rem 2rem;
    border-right: 1px solid var(--divider);
    min-width: 140px;
  }

  .stat-label {
    font-size: 0.55rem;
    font-weight: 200;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
  }

  .stat-value.gold { color: var(--gold); }

  /* Toolbar */
  .toolbar {
    background: var(--charcoal);
    border-bottom: 1px solid var(--divider);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .search-input {
    background: var(--mid);
    border: 1px solid rgba(201,168,76,0.12);
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    padding: 0.55rem 1rem;
    outline: none;
    width: 240px;
    transition: border-color 0.3s;
  }

  .search-input:focus { border-color: var(--gold-dim); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-select {
    background: var(--mid);
    border: 1px solid rgba(201,168,76,0.12);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    padding: 0.55rem 1rem;
    cursor: pointer;
    outline: none;
    appearance: none;
  }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .btn-outline {
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-outline:hover { border-color: var(--gold-dim); color: var(--gold); }

  .btn-danger {
    background: none;
    border: 1px solid rgba(200,50,50,0.25);
    color: rgba(200,100,100,0.6);
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* Table */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-size: 0.55rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 0.75rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--divider);
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--dark);
    z-index: 2;
  }

  .data-table td {
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--cream);
    padding: 1rem 1rem;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    vertical-align: top;
  }

  .data-table tr:hover td { background: rgba(201,168,76,0.03); }

  .td-ref {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .td-muted {
    color: var(--text-muted);
    font-size: 0.68rem;
    margin-top: 0.2rem;
  }

  .td-tag {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border: 1px solid var(--divider);
    color: var(--gold-dim);
    white-space: nowrap;
  }

  .td-dishes {
    font-size: 0.68rem;
    color: var(--gold-dim);
    line-height: 1.6;
    max-width: 200px;
  }

  .dish-pill {
    display: inline-block;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.15);
    color: var(--gold-dim);
    font-size: 0.58rem;
    padding: 0.15rem 0.5rem;
    margin: 0.1rem 0.1rem 0.1rem 0;
    letter-spacing: 0.05em;
  }

  .btn-delete {
    background: none;
    border: 1px solid rgba(200,50,50,0.2);
    color: rgba(200,100,100,0.5);
    font-family: 'Raleway', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    padding: 0.3rem 0.65rem;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  /* Empty / Loading */
  .state-box {
    text-align: center;
    padding: 5rem 2rem;
  }

  .state-icon {
    font-size: 2.5rem;
    margin-bottom: 1.25rem;
    opacity: 0.4;
  }

  .state-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .state-sub {
    font-size: 0.72rem;
    font-weight: 200;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
  }

  /* Detail modal */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(6px);
    transition: opacity 0.3s;
  }

  .detail-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .detail-card {
    background: var(--charcoal);
    border: 1px solid var(--divider);
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 2.5rem;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .detail-overlay.open .detail-card { transform: translateY(0); }

  .detail-close {
    position: absolute;
    top: 1.25rem; right: 1.5rem;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.25rem;
    cursor: pointer;
    transition: color 0.3s;
    line-height: 1;
  }

  .detail-close:hover { color: var(--gold); }

  .detail-ref {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    margin-bottom: 0.5rem;
  }

  .detail-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 2rem;
    line-height: 1.1;
  }

  .detail-name em { font-style: italic; color: var(--gold); }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .detail-field-label {
    font-size: 0.55rem;
    font-weight: 200;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.3rem;
  }

  .detail-field-value {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--cream);
  }

  .detail-dishes-section {
    border-top: 1px solid var(--divider);
    padding-top: 1.5rem;
    margin-top: 1.5rem;
  }

  .detail-dishes-title {
    font-size: 0.58rem;
    font-weight: 200;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }

  .detail-dishes-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .detail-notes {
    border-top: 1px solid var(--divider);
    padding-top: 1.25rem;
    margin-top: 1.25rem;
    font-size: 0.78rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.8;
    font-style: italic;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--charcoal);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    padding: 0.75rem 1.5rem;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  @media (max-width: 768px) {
    .stats-bar { display: none; }
    .search-input { width: 160px; }
    .topbar-badge { display: none; }
    .data-table { display: block; overflow-x: auto; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ -->
<!--  LOGIN SCREEN                               -->
<!-- ═══════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">AURUM</div>
    <div class="login-sub">Staff Portal · Restricted Access</div>

    <div class="login-card">
      <div class="login-title">Admin <em>Login</em></div>
      <div class="login-desc">Enter your credentials to access the reservations dashboard.</div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="loginUser" type="text" placeholder="admin" autocomplete="username" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        Sign In →
      </button>
      <div class="login-error" id="loginError">Invalid username or password.</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!--  DASHBOARD                                  -->
<!-- ═══════════════════════════════════════════ -->
<div id="dashboard">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">AURUM</div>
      <div class="topbar-badge">Admin Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="admin-name">Signed in as <span id="adminNameDisplay">Admin</span></div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Bookings</div>
      <div class="stat-value gold" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="statToday">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="statWeek">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Guests</div>
      <div class="stat-value" id="statGuests">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With Pre-Order</div>
      <div class="stat-value" id="statDishes">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="🔍  Search name, email, date, ref…" oninput="renderTable()">
    <select class="filter-select" id="filterDate" onchange="renderTable()">
      <option value="">All Dates</option>
      <option value="today">Today</option>
      <option value="week">This Week</option>
      <option value="month">This Month</option>
    </select>
    <select class="filter-select" id="filterOccasion" onchange="renderTable()">
      <option value="">All Occasions</option>
      <option>Anniversary</option>
      <option>Birthday</option>
      <option>Business Dinner</option>
      <option>Engagement</option>
      <option>Date Night</option>
      <option>Other</option>
    </select>
    <div class="toolbar-right">
      <button class="btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-outline" onclick="loadData()">↻ Refresh</button>
      <button class="btn-danger" onclick="clearAll()">⊘ Clear All</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap">
    <div class="state-box">
      <div class="state-icon">⟳</div>
      <div class="state-title">Loading reservations…</div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════ -->
<!--  DETAIL MODAL                               -->
<!-- ═══════════════════════════════════════════ -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-card" id="detailCard">
    <button class="detail-close" onclick="closeDetailModal()">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── SECRET URL KEY GUARD ──────────────────────────────────
  // Page is completely hidden unless URL contains ?key=aurum-secret-2025
  // Change this to anything you want — keep it secret!
  const SECRET_KEY = 'aurum-secret-2025';

  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('key') !== SECRET_KEY) {
      document.body.innerHTML = '';
      document.title = '404 — Not Found';
      history.replaceState(null, '', window.location.pathname);

      throw new Error('Access denied');
    }
  })();

  // ─── CONFIG ────────────────────────────────────────────────
  // 🔧 Change these to your real admin credentials
  const ADMIN_CREDENTIALS = {
    admin:  'aurum2025',
    manager: 'manager123'
  };

  const SUPABASE_URL     = 'https://gqpnowrxypuxbrkqegdf.supabase.co';
  const SUPABASE_SERVICE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxcG5vd3J4eXB1eGJya3FlZ2RmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjUyNzIxNSwiZXhwIjoyMDg4MTAzMjE1fQ.xrnCgzpUWjNNMGsWW14x5HbHeyiK7Ucy0T7-Wh6LjLE';

  const SB_HEADERS = {
    'apikey': SUPABASE_SERVICE,
    'Authorization': 'Bearer ' + SUPABASE_SERVICE,
    'Content-Type': 'application/json'
  };

  // ─── STATE ─────────────────────────────────────────────────
  let allReservations = [];
  let currentUser = null;

  // ─── AUTH ──────────────────────────────────────────────────
  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const btn  = document.getElementById('loginBtn');

    if (!user || !pass) {
      showLoginError('Please enter your username and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    setTimeout(() => {
      if (ADMIN_CREDENTIALS[user] && ADMIN_CREDENTIALS[user] === pass) {
        currentUser = user;
        sessionStorage.setItem('aurum_admin', user);
        showDashboard();
      } else {
        showLoginError('Invalid username or password.');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }, 600);
  }

  function doLogout() {
    sessionStorage.removeItem('aurum_admin');
    currentUser = null;
    allReservations = [];
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'flex';
    showToast('Signed out successfully');
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    document.getElementById('adminNameDisplay').textContent =
      currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
    loadData();
  }

  // Auto-login if session exists
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('aurum_admin');
    if (saved && ADMIN_CREDENTIALS[saved] !== undefined) {
      currentUser = saved;
      showDashboard();
    }
  });

  // ─── DATA ──────────────────────────────────────────────────
  async function loadData() {
    document.getElementById('tableWrap').innerHTML = `
      <div class="state-box">
        <div class="state-icon" style="animation:spin 1s linear infinite;display:inline-block;">⟳</div>
        <div class="state-title">Loading reservations…</div>
      </div>`;

    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/reservations?select=*&order=created_at.desc&limit=1000',
        { headers: SB_HEADERS }
      );
      if (!res.ok) throw new Error('Failed to load — HTTP ' + res.status);
      allReservations = await res.json();
      updateStats();
      renderTable();
      showToast('✓ ' + allReservations.length + ' reservations loaded');
    } catch (err) {
      document.getElementById('tableWrap').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠</div>
          <div class="state-title">Could not load reservations</div>
          <div class="state-sub">${escHtml(err.message)}</div>
        </div>`;
    }
  }

  // ─── STATS ─────────────────────────────────────────────────
  function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];

    const todayCount = allReservations.filter(r => r.date === today).length;
    const weekCount  = allReservations.filter(r => r.date >= weekAgo).length;
    const guestTotal = allReservations.reduce((sum, r) => {
      const n = parseInt((r.guests || '').replace(/\D/g,'')) || 0;
      return sum + n;
    }, 0);
    const withDishes = allReservations.filter(r => r.dishes && r.dishes.trim()).length;

    document.getElementById('statTotal').textContent  = allReservations.length;
    document.getElementById('statToday').textContent  = todayCount;
    document.getElementById('statWeek').textContent   = weekCount;
    document.getElementById('statGuests').textContent = guestTotal || '—';
    document.getElementById('statDishes').textContent = withDishes;
  }

  // ─── RENDER TABLE ──────────────────────────────────────────
  function renderTable() {
    const search  = (document.getElementById('searchInput').value || '').toLowerCase();
    const fDate   = document.getElementById('filterDate').value;
    const fOcc    = document.getElementById('filterOccasion').value;
    const today   = new Date().toISOString().split('T')[0];
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
    const monthAgo= new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];

    let filtered = allReservations.filter(r => {
      const hay = [r.ref,r.first,r.last,r.email,r.phone,r.date,r.guests,r.occasion,r.dishes,r.notes]
        .join(' ').toLowerCase();
      const matchSearch  = !search || hay.includes(search);
      const matchOcc     = !fOcc   || r.occasion === fOcc;
      let   matchDate    = true;
      if (fDate === 'today') matchDate = r.date === today;
      else if (fDate === 'week')  matchDate = r.date >= weekAgo;
      else if (fDate === 'month') matchDate = r.date >= monthAgo;
      return matchSearch && matchOcc && matchDate;
    });

    const wrap = document.getElementById('tableWrap');

    if (filtered.length === 0) {
      wrap.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📋</div>
          <div class="state-title">${allReservations.length === 0 ? 'No reservations yet' : 'No results found'}</div>
          <div class="state-sub">${allReservations.length === 0
            ? 'Reservations will appear here once guests book a table'
            : 'Try adjusting your search or filters'}</div>
        </div>`;
      return;
    }

    const rows = filtered.map(r => {
      const dateStr = r.date
        ? new Date(r.date + 'T12:00:00').toLocaleDateString('en-US',
            {weekday:'short', month:'short', day:'numeric', year:'numeric'})
        : '—';
      const createdStr = r.created_at
        ? new Date(r.created_at).toLocaleString('en-US',
            {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})
        : '—';
      const dishList = r.dishes
        ? r.dishes.split(',').slice(0,3).map(d =>
            `<span class="dish-pill">${escHtml(d.trim())}</span>`
          ).join('') + (r.dishes.split(',').length > 3
            ? `<span class="dish-pill">+${r.dishes.split(',').length-3} more</span>`
            : '')
        : '<span style="color:var(--text-muted);font-size:0.65rem;">None</span>';

      return `<tr>
        <td>
          <div class="td-ref">${escHtml(r.ref||'—')}</div>
          <div class="td-muted">${createdStr}</div>
        </td>
        <td>
          <div style="font-weight:400">${escHtml(r.first)} ${escHtml(r.last)}</div>
          <div class="td-muted">${escHtml(r.email||'')}</div>
          ${r.phone ? `<div class="td-muted">${escHtml(r.phone)}</div>` : ''}
        </td>
        <td>
          <div>${dateStr}</div>
          <div class="td-muted">${escHtml(r.time||'')}</div>
        </td>
        <td>${escHtml(r.guests||'—')}</td>
        <td>${r.occasion ? `<span class="td-tag">${escHtml(r.occasion)}</span>` : '<span class="td-muted">—</span>'}</td>
        <td class="td-dishes">${dishList}</td>
        <td>
          <div style="display:flex;gap:0.5rem;flex-direction:column;">
            <button class="btn-outline" style="font-size:0.55rem;padding:0.3rem 0.7rem;" onclick="viewDetail(${r.id})">View</button>
            <button class="btn-delete" onclick="deleteRow(${r.id})">Delete</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Ref · Booked On</th>
            <th>Guest</th>
            <th>Date · Time</th>
            <th>Guests</th>
            <th>Occasion</th>
            <th>Pre-Ordered Dishes</th>
            <th style="width:80px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="padding:1rem 0;font-family:'Raleway',sans-serif;font-size:0.65rem;font-weight:200;color:var(--text-muted);letter-spacing:0.15em;">
        Showing ${filtered.length} of ${allReservations.length} reservation${allReservations.length!==1?'s':''}
      </div>`;
  }

  // ─── DETAIL VIEW ───────────────────────────────────────────
  function viewDetail(id) {
    const r = allReservations.find(x => x.id === id);
    if (!r) return;

    const dateStr = r.date
      ? new Date(r.date + 'T12:00:00').toLocaleDateString('en-US',
          {weekday:'long', month:'long', day:'numeric', year:'numeric'})
      : '—';
    const createdStr = r.created_at
      ? new Date(r.created_at).toLocaleString('en-US',
          {month:'long', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'})
      : '—';

    const dishHTML = r.dishes
      ? r.dishes.split(',').map(d =>
          `<span class="dish-pill" style="font-size:0.68rem;padding:0.3rem 0.75rem;">${escHtml(d.trim())}</span>`
        ).join('')
      : '<span style="color:var(--text-muted);font-style:italic;font-size:0.78rem;">No dishes pre-ordered</span>';

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-ref">${escHtml(r.ref||'—')}</div>
      <div class="detail-name">${escHtml(r.first)} <em>${escHtml(r.last)}</em></div>
      <div class="detail-grid">
        <div>
          <div class="detail-field-label">Email</div>
          <div class="detail-field-value">${escHtml(r.email||'—')}</div>
        </div>
        <div>
          <div class="detail-field-label">Phone</div>
          <div class="detail-field-value">${escHtml(r.phone||'—')}</div>
        </div>
        <div>
          <div class="detail-field-label">Date</div>
          <div class="detail-field-value">${dateStr}</div>
        </div>
        <div>
          <div class="detail-field-label">Time</div>
          <div class="detail-field-value">${escHtml(r.time||'—')}</div>
        </div>
        <div>
          <div class="detail-field-label">Party Size</div>
          <div class="detail-field-value">${escHtml(r.guests||'—')}</div>
        </div>
        <div>
          <div class="detail-field-label">Occasion</div>
          <div class="detail-field-value">${r.occasion ? escHtml(r.occasion) : '—'}</div>
        </div>
        <div>
          <div class="detail-field-label">Booked On</div>
          <div class="detail-field-value">${createdStr}</div>
        </div>
      </div>
      <div class="detail-dishes-section">
        <div class="detail-dishes-title">Pre-Ordered Dishes</div>
        <div class="detail-dishes-pills">${dishHTML}</div>
      </div>
      ${r.notes ? `<div class="detail-notes">📝 ${escHtml(r.notes)}</div>` : ''}
      <div style="margin-top:2rem;display:flex;gap:0.75rem;">
        <button class="btn-danger" style="padding:0.6rem 1.25rem;" onclick="deleteRow(${r.id});closeDetailModal();">Delete Reservation</button>
        <button class="btn-outline" style="padding:0.6rem 1.25rem;" onclick="closeDetailModal()">Close</button>
      </div>`;

    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail(e) {
    if (e.target === document.getElementById('detailOverlay')) closeDetailModal();
  }

  function closeDetailModal() {
    document.getElementById('detailOverlay').classList.remove('open');
  }

  // ─── DELETE ────────────────────────────────────────────────
  async function deleteRow(id) {
    if (!confirm('Delete this reservation?')) return;
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/reservations?id=eq.' + id,
        { method: 'DELETE', headers: SB_HEADERS }
      );
      if (!res.ok) throw new Error('Delete failed');
      allReservations = allReservations.filter(r => r.id !== id);
      updateStats();
      renderTable();
      showToast('Reservation deleted');
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  async function clearAll() {
    if (allReservations.length === 0) return showToast('Nothing to clear');
    if (!confirm(`Delete ALL ${allReservations.length} reservations? This cannot be undone.`)) return;
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/reservations?id=gte.0',
        { method: 'DELETE', headers: SB_HEADERS }
      );
      if (!res.ok) throw new Error('Clear failed');
      allReservations = [];
      updateStats();
      renderTable();
      showToast('All reservations cleared');
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  // ─── EXPORT CSV ────────────────────────────────────────────
  function exportCSV() {
    if (allReservations.length === 0) return showToast('No data to export');
    const headers = ['Ref','First','Last','Email','Phone','Date','Time','Guests','Occasion','Dishes','Notes','Booked On'];
    const rows = allReservations.map(r => [
      r.ref||'', r.first||'', r.last||'', r.email||'', r.phone||'',
      r.date||'', r.time||'', r.guests||'', r.occasion||'',
      (r.dishes||'').replace(/,/g,' |'), r.notes||'',
      r.created_at ? new Date(r.created_at).toLocaleString() : ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'aurum-reservations-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ CSV exported');
  }

  // ─── TOAST ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─── HELPERS ───────────────────────────────────────────────
  function escHtml(str) {
    return String(str||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Spin animation for loader
  const style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);
</script>
</body>
</html>
