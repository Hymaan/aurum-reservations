<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal Dine — Menu QR Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Raleway:wght@200;300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Raleway', sans-serif;
    background: #f0ece4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
    gap: 2rem;
  }

  /* ─── CONTROLS ─── */
  .controls {
    background: #1a1714;
    color: #f5efe0;
    padding: 1.25rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.25rem;
    align-items: flex-end;
    width: 100%;
    max-width: 700px;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 200px; }
  .ctrl-label {
    font-size: 0.52rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #8a6d2f;
  }
  .ctrl-input {
    background: #2c2820;
    border: 1px solid rgba(201,168,76,0.3);
    color: #f5efe0;
    font-family: 'Raleway', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    padding: 0.5rem 0.75rem;
    outline: none;
    width: 100%;
  }
  .ctrl-input:focus { border-color: #c9a84c; }
  .btn-row { display: flex; gap: 0.75rem; align-self: flex-end; }
  .ctrl-btn {
    background: #c9a84c;
    color: #1a1714;
    border: none;
    font-family: 'Raleway', sans-serif;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: #e8c96e; }
  .ctrl-btn.outline {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: #c9a84c;
  }
  .ctrl-btn.outline:hover { background: rgba(201,168,76,0.1); }

  /* ─── CARDS WRAP ─── */
  .cards-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
  }

  /* ─── CARD PORTRAIT (A5-ish stand card) ─── */
  .menu-card {
    width: 90mm;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8mm 7mm 7mm;
    page-break-inside: avoid;
    position: relative;
  }

  /* Gold top bar */
  .card-top-bar {
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin-bottom: 6mm;
  }

  .card-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: #1a1714;
    text-align: center;
    margin-bottom: 2px;
  }
  .card-tagline {
    font-size: 7px;
    font-weight: 200;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #8a6d2f;
    text-align: center;
    margin-bottom: 6mm;
  }

  /* Ornamental divider */
  .card-ornament {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    margin-bottom: 6mm;
  }
  .card-ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4));
  }
  .card-ornament-line.right {
    background: linear-gradient(270deg, transparent, rgba(201,168,76,0.4));
  }
  .card-ornament-diamond {
    width: 5px; height: 5px;
    background: #c9a84c;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .card-invite {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: #4a3f30;
    text-align: center;
    margin-bottom: 5mm;
    line-height: 1.6;
  }

  /* QR box */
  .card-qr-wrap {
    width: 54mm;
    height: 54mm;
    border: 1px solid rgba(201,168,76,0.25);
    padding: 3mm;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4mm;
    position: relative;
  }
  /* Corner accents */
  .card-qr-wrap::before,
  .card-qr-wrap::after {
    content: '';
    position: absolute;
    width: 5mm; height: 5mm;
    border-color: #c9a84c;
    border-style: solid;
  }
  .card-qr-wrap::before {
    top: -1px; left: -1px;
    border-width: 1.5px 0 0 1.5px;
  }
  .card-qr-wrap::after {
    bottom: -1px; right: -1px;
    border-width: 0 1.5px 1.5px 0;
  }
  .card-qr-wrap canvas,
  .card-qr-wrap img {
    width: 48mm !important;
    height: 48mm !important;
  }

  .card-scan-text {
    font-size: 8px;
    font-weight: 200;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #7a6e5f;
    text-align: center;
    margin-bottom: 5mm;
  }

  .card-divider {
    width: 100%;
    border: none;
    border-top: 1px dashed rgba(201,168,76,0.3);
    margin-bottom: 4mm;
  }

  .card-features {
    display: flex;
    justify-content: center;
    gap: 5mm;
    margin-bottom: 4mm;
  }
  .card-feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5px;
  }
  .card-feature-icon { font-size: 11px; }
  .card-feature-label {
    font-size: 6px;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a6d2f;
  }

  .card-url {
    font-size: 7.5px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #aaa;
    text-align: center;
    margin-top: 2mm;
  }

  /* Gold bottom bar */
  .card-bottom-bar {
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin-top: 6mm;
  }

  /* ─── PRINT ─── */
  @media print {
    body { background: #fff; padding: 5mm; }
    .controls { display: none !important; }
    .cards-wrap { gap: 8mm; }
    .menu-card { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="ctrl-group">
    <label class="ctrl-label">Your Website URL</label>
    <input class="ctrl-input" id="siteUrl" type="text"
      value="https://coastaldine.com"
      placeholder="https://coastaldine.com">
  </div>
  <div class="btn-row">
    <button class="ctrl-btn" onclick="generate()">Generate</button>
    <button class="ctrl-btn outline" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<div class="cards-wrap" id="cardsWrap"></div>

<script>
  function generate() {
    const url  = document.getElementById('siteUrl').value.trim();
    const wrap = document.getElementById('cardsWrap');
    if (!url) { alert('Please enter your website URL.'); return; }

    wrap.innerHTML = `
      <div class="menu-card" id="menuCard">
        <div class="card-top-bar"></div>

        <div class="card-logo">COASTAL DINE</div>
        <div class="card-tagline">Authentic Mangalorean Cuisine</div>

        <div class="card-ornament">
          <div class="card-ornament-line"></div>
          <div class="card-ornament-diamond"></div>
          <div class="card-ornament-line right"></div>
        </div>

        <div class="card-invite">
          Scan to explore our full menu,<br>place your order & reserve a table
        </div>

        <div class="card-qr-wrap" id="qrBox"></div>

        <div class="card-scan-text">Scan with your phone camera</div>

        <hr class="card-divider">

        <div class="card-features">
          <div class="card-feature">
            <span class="card-feature-icon">🍽</span>
            <span class="card-feature-label">Reserve</span>
          </div>
          <div class="card-feature">
            <span class="card-feature-icon">🛍</span>
            <span class="card-feature-label">Takeaway</span>
          </div>
          <div class="card-feature">
            <span class="card-feature-icon">🪑</span>
            <span class="card-feature-label">Dine In</span>
          </div>
        </div>

        <div class="card-url">${url.replace('https://','')}</div>
        <div class="card-bottom-bar"></div>
      </div>`;

    new QRCode(document.getElementById('qrBox'), {
      text: url,
      width: 182,
      height: 182,
      colorDark: '#1a1714',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  window.addEventListener('load', generate);
</script>
</body>
</html>
